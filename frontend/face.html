<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Face Expressions — Character Editor</title>
  <link rel="stylesheet" href="style.css" />
  <script src="/shell.js" defer></script>
  <script type="importmap">
  {
    "imports": {
      "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
      "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/"
    }
  }
  </script>
</head>
<body class="tool">
  <div class="workspace">
  <aside id="panel">
    <h1>Face<br/>Expressions</h1>
    <p class="sub">Generate ARKit-52 facial shape keys for a head model, then
      apply expressions live.</p>

    <div id="engine" class="engine">Detecting engine&hellip;</div>

    <label class="field">
      <span>Head / face model</span>
      <input type="file" id="file" accept=".obj,.glb,.gltf,.fbx" />
      <small>A head or face mesh (OBJ, GLB/glTF, FBX).</small>
    </label>

    <button type="button" data-project-use class="hidden">Use current project model</button>

    <button id="run" disabled>Generate expressions</button>
    <div id="status" class="status"></div>

    <div id="exprPanel" class="hidden">
      <label class="field">
        <span>Expression preset</span>
        <select id="preset"></select>
      </label>
      <div class="field">
        <span>Fine-tune shapes <small id="skCount"></small></span>
        <div id="sliders" class="sliders"></div>
      </div>

      <label class="field">
        <span>Export format</span>
        <select id="outFormat">
          <option value="glb" selected>GLB (keeps shape keys)</option>
          <option value="gltf">glTF (keeps shape keys)</option>
          <option value="fbx">FBX (keeps shape keys)</option>
          <option value="obj">OBJ (base mesh only)</option>
          <option value="ply">PLY (base mesh only)</option>
          <option value="stl">STL (base mesh only)</option>
        </select>
        <small>GLB / glTF / FBX keep all 52 shape keys. OBJ / PLY / STL can't
          store blendshapes, so they export the base (neutral) mesh only.</small>
      </label>
      <button id="download" class="download">Download model</button>
      <button type="button" data-save-new="Face" class="seg hidden" style="margin-top:6px">＋ Save as new project</button>
    </div>

    <footer>
      <p>
        <label class="check"><input type="checkbox" id="wire" /> Wireframe</label>
        <button id="resetExpr" class="seg">Reset to neutral</button>
      </p>
    </footer>
  </aside>

  <main id="stage">
    <div id="hint">Load a head model and generate its shape keys.</div>
    <canvas id="view"></canvas>
  </main>
  </div>

  <script type="module" src="face.js"></script>
</body>
</html>
